version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_desafio
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: produtodb
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: redis_desafio
    restart: always
    ports:
      - "6379:6379"